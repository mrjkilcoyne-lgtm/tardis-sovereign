name: 'Build Container Images'

# Trigger this from other repos via workflow_dispatch,
# or add paths for Dockerfiles if they live here
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to build (claimourlife, hex-inventions, bakk-online, lgm, luggage)'
        required: true
        type: string
      app_repo:
        description: 'Source repository (e.g., mrjkilcoyne-lgtm/claimourlife)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: 'Build & Push Image'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.app_repo }}
          token: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mrjkilcoyne-lgtm/${{ github.event.inputs.app_name }}:latest
            ghcr.io/mrjkilcoyne-lgtm/${{ github.event.inputs.app_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
