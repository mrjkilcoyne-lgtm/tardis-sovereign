<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="16%" style="stop-color:#e67e22"/>
      <stop offset="33%" style="stop-color:#f1c40f"/>
      <stop offset="50%" style="stop-color:#2ecc71"/>
      <stop offset="66%" style="stop-color:#3498db"/>
      <stop offset="83%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#e74c3c"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2c2c"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <!-- Background circle - looks like any dark app icon -->
  <circle cx="256" cy="256" r="256" fill="#0a0a0a"/>
  <!-- The card shape - plain, professional -->
  <rect x="106" y="156" width="300" height="200" rx="16" fill="url(#card)"/>
  <!-- The shimmer edge - blink and you'd miss it -->
  <rect x="106" y="156" width="300" height="200" rx="16" fill="none" stroke="url(#shimmer)" stroke-width="2.5" opacity="0.4"/>
  <!-- Subtle inner lines like a real card -->
  <rect x="130" y="188" width="80" height="12" rx="2" fill="#333"/>
  <rect x="130" y="210" width="140" height="8" rx="2" fill="#2a2a2a"/>
  <rect x="130" y="226" width="100" height="8" rx="2" fill="#2a2a2a"/>
  <!-- The tiny QR in the corner -->
  <rect x="330" y="280" width="52" height="52" rx="4" fill="#222"/>
  <rect x="336" y="286" width="10" height="10" fill="#444"/>
  <rect x="350" y="286" width="10" height="10" fill="#444"/>
  <rect x="364" y="286" width="10" height="10" fill="#444"/>
  <rect x="336" y="300" width="10" height="10" fill="#444"/>
  <rect x="364" y="300" width="10" height="10" fill="#444"/>
  <rect x="336" y="314" width="10" height="10" fill="#444"/>
  <rect x="350" y="314" width="10" height="10" fill="#444"/>
  <rect x="364" y="314" width="10" height="10" fill="#444"/>
  <!-- The hologram dot - only sparkle if you know to look -->
  <circle cx="370" cy="190" r="14" fill="url(#shimmer)" opacity="0.15"/>
  <circle cx="370" cy="190" r="8" fill="url(#shimmer)" opacity="0.25"/>
  <circle cx="370" cy="190" r="3" fill="#fff" opacity="0.4"/>
</svg>
