<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Psychic Paper</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#141414;--glass:rgba(255,255,255,0.06);
  --glass-border:rgba(255,255,255,0.1);--text:#e8e8e8;--text-dim:#888;
  --accent:#3b82f6;--radius:16px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column;align-items:center;justify-content:center}

/* Glass morphism */
.glass{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius)}

/* Setup screen */
#setup{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);transition:opacity .4s,transform .4s}
#setup.hidden{opacity:0;transform:scale(1.05);pointer-events:none}
#setup h1{font-size:1.8rem;margin-bottom:.3rem;font-weight:700;letter-spacing:-.02em}
#setup p{color:var(--text-dim);margin-bottom:2rem;font-size:.9rem}
#setup .logo{width:80px;height:80px;margin-bottom:1.5rem}
.setup-form{display:flex;flex-direction:column;gap:12px;width:min(320px,85vw)}
.setup-form input{background:var(--surface);border:1px solid var(--glass-border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:1rem;outline:none;transition:border-color .2s}
.setup-form input:focus{border-color:var(--accent)}
.setup-form input::placeholder{color:#555}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:8px;transition:transform .15s,opacity .15s}
.btn-primary:active{transform:scale(.97);opacity:.9}

/* Main app */
#app{display:none;flex-direction:column;align-items:center;width:100%;height:100%;padding:16px 16px env(safe-area-inset-bottom,16px)}
#app.active{display:flex}

/* Top bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:420px;margin-bottom:12px;padding:0 4px}
.top-bar .identity{font-size:.75rem;color:var(--text-dim);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-bar .reset-btn{background:none;border:none;color:var(--text-dim);font-size:.7rem;cursor:pointer;padding:6px 10px;border-radius:8px;transition:background .2s}
.top-bar .reset-btn:hover{background:var(--glass)}

/* Situation input */
.situation-wrap{width:100%;max-width:420px;margin-bottom:16px}
.situation-wrap input{width:100%;background:var(--surface);border:1px solid var(--glass-border);border-radius:14px;padding:14px 18px;color:var(--text);font-size:1rem;outline:none;transition:border-color .2s}
.situation-wrap input:focus{border-color:var(--accent)}
.situation-wrap input::placeholder{color:#555}

/* Document viewport */
.doc-viewport{flex:1;display:flex;align-items:center;justify-content:center;width:100%;max-width:420px;perspective:1200px;min-height:0}

/* Document card wrapper */
.doc-card{position:relative;width:100%;transition:transform .3s ease,opacity .3s ease;transform-style:preserve-3d}
.doc-card.morph-out{transform:scale(.92) rotateY(90deg);opacity:0}
.doc-card.morph-in{transform:scale(.92) rotateY(-90deg);opacity:0}

/* Document types base */
.document{border-radius:16px;overflow:hidden;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.5)}

/* Card layout (credit card ratio ~1.586) */
.layout-card{aspect-ratio:1.586/1;padding:24px;display:flex;flex-direction:column;justify-content:space-between}

/* Ticket layout */
.layout-ticket{aspect-ratio:2.5/1;display:flex;position:relative}
.layout-ticket .ticket-main{flex:1;padding:20px 24px;display:flex;flex-direction:column;justify-content:space-between}
.layout-ticket .ticket-stub{width:72px;border-left:2px dashed rgba(255,255,255,.15);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;position:relative}
.layout-ticket .ticket-stub::before{content:'';position:absolute;left:-9px;top:-8px;width:16px;height:16px;border-radius:50%;background:var(--bg)}
.layout-ticket .ticket-stub::after{content:'';position:absolute;left:-9px;bottom:-8px;width:16px;height:16px;border-radius:50%;background:var(--bg)}

/* Badge layout */
.layout-badge{display:flex;flex-direction:column;min-height:280px}
.layout-badge .badge-header{padding:16px 24px;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:.75rem}
.layout-badge .badge-body{flex:1;padding:20px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.layout-badge .badge-lanyard{width:40px;height:20px;margin:0 auto -1px;border-radius:0 0 8px 8px;position:relative}
.layout-badge .badge-lanyard::before{content:'';position:absolute;left:50%;top:-40px;transform:translateX(-50%);width:2px;height:40px;background:rgba(255,255,255,.2)}
.layout-badge .badge-lanyard::after{content:'';position:absolute;left:50%;top:-40px;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3)}

/* Full document layout */
.layout-full{min-height:360px;padding:32px 28px;display:flex;flex-direction:column;border:3px double rgba(255,255,255,.15)}

/* Shimmer/hologram effect */
.shimmer{position:absolute;width:60px;height:60px;border-radius:50%;background:conic-gradient(from 0deg,#e74c3c,#e67e22,#f1c40f,#2ecc71,#3498db,#9b59b6,#e74c3c);opacity:.18;animation:shimmerSpin 3s linear infinite;filter:blur(1px)}
@keyframes shimmerSpin{to{transform:rotate(360deg)}}

/* Rainbow edge shimmer for certain cards */
.rainbow-edge::before{content:'';position:absolute;inset:-1px;border-radius:17px;background:conic-gradient(from var(--angle,0deg),#e74c3c,#e67e22,#f1c40f,#2ecc71,#3498db,#9b59b6,#e74c3c);z-index:-1;opacity:.3;animation:rainbowRotate 4s linear infinite}
@keyframes rainbowRotate{to{--angle:360deg}}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}

/* QR code */
.qr-box{width:48px;height:48px;display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(7,1fr);gap:1px;background:rgba(255,255,255,.9);padding:3px;border-radius:4px}
.qr-box .qr-cell{border-radius:1px}
.qr-box .qr-cell.on{background:#111}
.qr-box .qr-cell.off{background:rgba(255,255,255,.9)}

/* Document text styles */
.doc-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;opacity:.6;margin-bottom:2px}
.doc-value{font-size:.95rem;font-weight:600;letter-spacing:.01em}
.doc-title{font-size:1.4rem;font-weight:800;letter-spacing:-.01em}
.doc-subtitle{font-size:.8rem;opacity:.7}
.doc-id{font-family:'Courier New',monospace;font-size:.7rem;opacity:.5;letter-spacing:.05em}

/* Quick select pills */
.quick-select{display:flex;gap:8px;overflow-x:auto;width:100%;max-width:420px;padding:8px 4px 16px;-ms-overflow-style:none;scrollbar-width:none}
.quick-select::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;padding:8px 16px;border-radius:20px;background:var(--surface);border:1px solid var(--glass-border);color:var(--text-dim);font-size:.8rem;cursor:pointer;transition:all .2s;flex-shrink:0}
.pill:active,.pill.active{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(.95)}
.bottom-nav{display:flex;width:100%;max-width:420px;border-top:1px solid var(--glass-border);background:var(--surface)}
.nav-tab{flex:1;padding:12px 0 max(12px,env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--text-dim);font-size:.65rem;cursor:pointer;transition:color .2s}
.nav-tab.active{color:var(--accent)}
.nav-tab svg{width:20px;height:20px}
#tardis-chat{display:none;flex-direction:column;width:100%;max-width:420px;flex:1;min-height:0}
#tardis-chat.active{display:flex}
.chat-messages{flex:1;overflow-y:auto;padding:12px 4px;display:flex;flex-direction:column;gap:8px;min-height:0}
.msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:.9rem;line-height:1.45;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.tardis{align-self:flex-start;background:var(--surface);border:1px solid var(--glass-border);color:var(--text);border-bottom-left-radius:4px}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.chat-input-wrap{display:flex;gap:8px;padding:8px 0}
.chat-input-wrap input{flex:1;background:var(--surface);border:1px solid var(--glass-border);border-radius:14px;padding:12px 16px;color:var(--text);font-size:.95rem;outline:none}
.chat-input-wrap input:focus{border-color:var(--accent)}
.chat-input-wrap button{background:var(--accent);border:none;color:#fff;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.typing{align-self:flex-start;padding:10px 14px;background:var(--surface);border:1px solid var(--glass-border);border-radius:14px;border-bottom-left-radius:4px;display:flex;gap:4px}
.typing span{width:6px;height:6px;background:var(--text-dim);border-radius:50%;animation:typeDot 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typeDot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.stealth-indicator{position:fixed;top:8px;left:50%;transform:translateX(-50%);font-size:.6rem;color:var(--text-dim);opacity:.3;letter-spacing:.1em;z-index:50}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
  <img src="icon.svg" class="logo" alt="Psychic Paper">
  <h1>Psychic Paper</h1>
  <p>It shows them whatever I want them to see.</p>
  <div class="setup-form">
    <input type="text" id="inp-name" placeholder="Your name" autocomplete="name">
    <input type="text" id="inp-org" placeholder="Organisation">
    <input type="text" id="inp-title" placeholder="Title / Role">
    <button class="btn-primary" id="btn-save">Activate</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="stealth-indicator" id="stealth-ind"></div>
  <div class="top-bar">
    <span class="identity" id="identity-label"></span>
    <button class="reset-btn" id="btn-reset">Edit Identity</button>
  </div>

  <div id="paper-view" style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:420px;flex:1;min-height:0">
    <div class="situation-wrap">
      <input type="text" id="inp-situation" placeholder="Enter situation... (e.g. press conference)">
    </div>
    <div class="doc-viewport">
      <div class="doc-card" id="doc-card"></div>
    </div>
    <div class="quick-select" id="quick-select">
      <button class="pill" data-kw="press conference">Press</button>
      <button class="pill" data-kw="concert">Concert</button>
      <button class="pill" data-kw="flight boarding">Flight</button>
      <button class="pill" data-kw="security clearance">Security</button>
      <button class="pill" data-kw="conference delegate">Conference</button>
      <button class="pill" data-kw="train metro">Travel</button>
    </div>
  </div>

  <div id="tardis-chat">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-wrap">
      <input type="text" id="chat-input" placeholder="Talk to TARDIS..." autocomplete="off">
      <button id="chat-send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-tab active" data-tab="paper">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 7h10M7 12h6M7 17h8"/></svg>
      Paper
    </button>
    <button class="nav-tab" data-tab="tardis">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      TARDIS
    </button>
  </div>
</div>

<script>
/* ========== DOCUMENT TYPE DEFINITIONS ========== */
const DOC_TYPES = {
  press_pass: {
    keywords: ['press','media','journalist','reporter','news'],
    label: 'PRESS',
    layout: 'badge',
    colors: { primary:'#1a3a5c', accent:'#4da6ff', bg:'#0d2137', text:'#e8f0ff', headerBg:'#4da6ff', headerText:'#0d2137' },
    shimmer: false,
    fields: (id) => ({
      header: 'PRESS',
      title: id.name,
      subtitle: id.org || 'Freelance',
      extra: id.title || 'Correspondent',
      badge: 'MEDIA ACCESS ALL AREAS'
    })
  },
  event_ticket: {
    keywords: ['concert','show','gig','festival','event','performance','theatre','theater'],
    label: 'EVENT TICKET',
    layout: 'ticket',
    colors: { primary:'#2d1b4e', accent:'#c084fc', bg:'#1a0f2e', text:'#f0e6ff' },
    shimmer: false,
    fields: (id) => ({
      event: 'LIVE EVENT',
      venue: 'Main Stage',
      holder: id.name,
      section: 'GA',
      row: String.fromCharCode(65 + Math.floor(Math.random()*8)),
      seat: String(Math.floor(Math.random()*40)+1)
    })
  },
  boarding_pass: {
    keywords: ['flight','airport','boarding','airline','plane','travel abroad'],
    label: 'BOARDING PASS',
    layout: 'ticket',
    colors: { primary:'#1a2744', accent:'#60a5fa', bg:'#0f1a2e', text:'#dbeafe' },
    shimmer: false,
    fields: (id) => {
      const codes = ['LHR','JFK','CDG','NRT','LAX','SFO','SIN','DXB'];
      const from = codes[Math.floor(Math.random()*codes.length)];
      let to = codes[Math.floor(Math.random()*codes.length)];
      while(to===from) to = codes[Math.floor(Math.random()*codes.length)];
      return { passenger:id.name, from, to, gate:'B'+Math.floor(Math.random()*40+1), seat:String.fromCharCode(65+Math.floor(Math.random()*6))+Math.floor(Math.random()*30+1), cls:'ECONOMY' };
    }
  },
  driving_licence: {
    keywords: ['driving','licence','license','vehicle','drive','dvla'],
    label: 'DRIVING LICENCE',
    layout: 'card',
    colors: { primary:'#1e3a5f', accent:'#ec4899', bg:'#162d4a', text:'#e0e7ff' },
    shimmer: true,
    fields: (id) => ({
      name: id.name,
      dob: '15.06.1990',
      issued: '01.03.2022',
      expires: '15.06.2030',
      address: 'London, United Kingdom',
      categories: 'A B BE'
    })
  },
  membership: {
    keywords: ['member','club','gym','library','loyalty','vip'],
    label: 'MEMBERSHIP',
    layout: 'card',
    colors: { primary:'#1a1a1a', accent:'#fbbf24', bg:'#111', text:'#f5f0e0' },
    shimmer: true,
    fields: (id) => ({
      name: id.name,
      tier: 'GOLD',
      org: id.org || 'The Club',
      since: '2021',
      status: 'ACTIVE'
    })
  },
  security_badge: {
    keywords: ['security','clearance','restricted','classified','access','authorized'],
    label: 'SECURITY',
    layout: 'badge',
    colors: { primary:'#1c1c1c', accent:'#ef4444', bg:'#111', text:'#fecaca', headerBg:'#dc2626', headerText:'#fff' },
    shimmer: true,
    fields: (id) => ({
      header: 'SECURITY CLEARANCE',
      title: id.name,
      subtitle: id.org || 'CLASSIFIED',
      extra: id.title || 'Level 5 Operative',
      badge: 'RESTRICTED ACCESS'
    })
  },
  transport_pass: {
    keywords: ['tube','bus','train','metro','underground','tfl','oyster','transit','tram'],
    label: 'TRANSPORT',
    layout: 'card',
    colors: { primary:'#003688', accent:'#00a4e4', bg:'#002255', text:'#e0efff' },
    shimmer: false,
    fields: (id) => ({
      name: id.name,
      type: 'ALL ZONES',
      valid: 'Valid until 2027',
      network: 'METROPOLITAN TRANSIT'
    })
  },
  conference_badge: {
    keywords: ['conference','delegate','summit','speaker','keynote','workshop','seminar','expo'],
    label: 'CONFERENCE',
    layout: 'badge',
    colors: { primary:'#1a1a2e', accent:'#818cf8', bg:'#0f0f23', text:'#e0e0ff', headerBg:'#6366f1', headerText:'#fff' },
    shimmer: false,
    fields: (id) => ({
      header: 'DELEGATE',
      title: id.name,
      subtitle: id.org || 'Independent',
      extra: id.title || 'Attendee',
      badge: 'ALL ACCESS PASS'
    })
  },
  permit: {
    keywords: ['permit','authorization','approved','licence','official','granted','warrant'],
    label: 'OFFICIAL PERMIT',
    layout: 'full',
    colors: { primary:'#f5f0e8', accent:'#8b7355', bg:'#ede8df', text:'#2c2418' },
    shimmer: false,
    fields: (id) => ({
      heading: 'OFFICIAL PERMIT',
      body: `This document certifies that ${id.name}${id.org ? ' of '+id.org : ''} is hereby granted full authorization and clearance as required.`,
      signatory: 'Director of Operations',
      date: new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})
    })
  },
  invitation: {
    keywords: ['invite','invitation','gala','dinner','ceremony','reception','ball','banquet'],
    label: 'INVITATION',
    layout: 'card',
    colors: { primary:'#1a0a1e', accent:'#d4af37', bg:'#150a18', text:'#f0e6d0' },
    shimmer: true,
    fields: (id) => ({
      heading: 'You are cordially invited',
      name: id.name,
      event: 'The Annual Gala',
      dress: 'Black Tie',
      rsvp: 'Confirmed'
    })
  }
};

/* ========== UTILITY FUNCTIONS ========== */
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)}

function genRefId(seed){
  const h=hashStr(seed+Date.now().toString(36));
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let r='';for(let i=0;i<12;i++)r+=chars[(h*((i+1)*7))%chars.length];
  return r.slice(0,4)+'-'+r.slice(4,8)+'-'+r.slice(8,12);
}

function genQRCells(seed){
  const h=hashStr(seed);
  const cells=[];
  for(let i=0;i<49;i++){
    // Corner patterns always on
    const row=Math.floor(i/7),col=i%7;
    const isCorner=(row<3&&col<3)||(row<3&&col>3)||(row>3&&col<3);
    cells.push(isCorner?true:((h*(i+1)*13)%7<4));
  }
  return cells;
}

function renderQR(seed){
  const cells=genQRCells(seed);
  return '<div class="qr-box">'+cells.map(on=>`<div class="qr-cell ${on?'on':'off'}"></div>`).join('')+'</div>';
}

/* ========== DOCUMENT RENDERER ========== */
function detectType(situation){
  const s=situation.toLowerCase();
  for(const[key,def]of Object.entries(DOC_TYPES)){
    if(def.keywords.some(kw=>s.includes(kw)))return key;
  }
  return 'press_pass'; // fallback
}

function renderDocument(typeKey, identity){
  const def=DOC_TYPES[typeKey];
  const f=def.fields(identity);
  const refId=genRefId(typeKey+identity.name);
  const qr=renderQR(refId);
  const c=def.colors;
  let html='';

  if(def.layout==='card'){
    html=`<div class="document layout-card${def.shimmer?' rainbow-edge':''}" style="background:${c.bg};color:${c.text}">
      ${def.shimmer?'<div class="shimmer" style="top:12px;right:12px"></div>':''}
      <div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="doc-label" style="color:${c.accent}">${def.label}</div>
            ${typeKey==='driving_licence'?`
              <div class="doc-value" style="margin-top:6px">${f.name}</div>
              <div style="margin-top:10px;display:flex;gap:20px">
                <div><div class="doc-label">DOB</div><div style="font-size:.8rem">${f.dob}</div></div>
                <div><div class="doc-label">EXPIRES</div><div style="font-size:.8rem">${f.expires}</div></div>
              </div>
              <div style="margin-top:6px;font-size:.7rem;opacity:.6">${f.address}</div>
              <div style="margin-top:4px;font-size:.7rem;font-weight:700;color:${c.accent}">${f.categories}</div>
            `:typeKey==='membership'?`
              <div style="margin-top:4px;font-size:.7rem;font-weight:700;color:${c.accent};letter-spacing:.1em">${f.tier} MEMBER</div>
              <div class="doc-title" style="margin-top:10px;color:${c.accent}">${f.org}</div>
              <div class="doc-value" style="margin-top:8px">${f.name}</div>
              <div style="font-size:.75rem;opacity:.5;margin-top:4px">Member since ${f.since} &middot; ${f.status}</div>
            `:typeKey==='transport_pass'?`
              <div class="doc-title" style="margin-top:8px;font-size:1.1rem;color:${c.accent}">${f.network}</div>
              <div class="doc-value" style="margin-top:10px">${f.name}</div>
              <div style="font-size:.8rem;margin-top:6px;font-weight:600">${f.type}</div>
              <div style="font-size:.7rem;opacity:.6;margin-top:4px">${f.valid}</div>
            `:typeKey==='invitation'?`
              <div style="font-style:italic;font-size:.85rem;margin-top:8px;opacity:.8">${f.heading}</div>
              <div class="doc-title" style="margin-top:8px;color:${c.accent}">${f.name}</div>
              <div style="margin-top:6px;font-size:.85rem">${f.event}</div>

          `:`

              <div style="font-size:2rem;font-weight:800;color:${c.accent}">${f.from}</div>

              <div style="font-size:2rem;font-weight:800;color:${c.accent}">${f.to}</div>
            </div>
            <div style="margin-top:8px">

        </div>
        <div class="doc-id">${refId}</div>
      </div>
      <div class="ticket-stub">
        <div style="writing-mode:vertical-rl;text-orientation:mixed;font-size:.65rem;font-weight:700;letter-spacing:.1em;opacity:.5;transform:rotate(180deg)">${def.label}</div>

  }
  else if(def.layout==='badge'){
    html=`<div class="document layout-badge${def.shimmer?' rainbow-edge':''}" style="background:${c.bg};color:${c.text}">

      <div class="badge-body">
        <div class="doc-title" style="text-align:center;margin-bottom:4px">${f.title}</div>

        <div style="font-size:.75rem;color:${c.accent};font-weight:600;margin-bottom:16px;text-align:center">${f.extra}</div>

  }
  else if(def.layout==='full'){
    html=`<div class="document layout-full" style="background:${c.bg};color:${c.text}">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;opacity:.5;margin-bottom:8px">Official Document</div>
        <div style="font-size:1.3rem;font-weight:800;letter-spacing:.02em;color:${c.accent}">${f.heading}</div>
        <div style="width:60px;height:2px;background:${c.accent};margin:10px auto;opacity:.4"></div>
      </div>
      <div style="flex:1">

          <div><div class="doc-label">DATE</div><div style="font-size:.8rem">${f.date}</div></div>

}

/* ========== APP STATE ========== */
let currentType=null;
let identity={name:'',org:'',title:''};

function loadIdentity(){
  try{
    const d=JSON.parse(localStorage.getItem('psychic_identity'));
    if(d&&d.name)return d;
  }catch(e){}
  return null;
}

function saveIdentity(id){
  localStorage.setItem('psychic_identity',JSON.stringify(id));
}

function showSetup(){
  const s=document.getElementById('setup');
  s.classList.remove('hidden');
  document.getElementById('app').classList.remove('active');
  const saved=loadIdentity();
  if(saved){
    document.getElementById('inp-name').value=saved.name||'';
    document.getElementById('inp-org').value=saved.org||'';
    document.getElementById('inp-title').value=saved.title||'';
  }
}

function showApp(){
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('app').classList.add('active');
  document.getElementById('identity-label').textContent=identity.name+(identity.org?' \u00b7 '+identity.org:'');
  morphTo('press_pass');
}

function morphTo(typeKey){
  if(typeKey===currentType)return;
  const card=document.getElementById('doc-card');

  if(currentType){
    card.classList.add('morph-out');
    setTimeout(()=>{
      card.innerHTML=renderDocument(typeKey,identity);
      card.classList.remove('morph-out');
      card.classList.add('morph-in');
      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          card.classList.remove('morph-in');
        });
      });
      currentType=typeKey;
    },300);
  }else{
    card.innerHTML=renderDocument(typeKey,identity);
    currentType=typeKey;
  }

  // Update active pill
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
}

/* ========== EVENT HANDLERS ========== */
document.getElementById('btn-save').addEventListener('click',()=>{
  const name=document.getElementById('inp-name').value.trim();
  if(!name)return document.getElementById('inp-name').focus();
  identity={name,org:document.getElementById('inp-org').value.trim(),title:document.getElementById('inp-title').value.trim()};
  saveIdentity(identity);
  showApp();
});

document.getElementById('btn-reset').addEventListener('click',showSetup);

let debounceTimer;
document.getElementById('inp-situation').addEventListener('input',function(){
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(()=>{
    if(this.value.trim()){
      const t=detectType(this.value);
      morphTo(t);
    }
  },300);
});

document.getElementById('quick-select').addEventListener('click',function(e){
  const pill=e.target.closest('.pill');
  if(!pill)return;
  const kw=pill.dataset.kw;
  document.getElementById('inp-situation').value=kw;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  pill.classList.add('active');
  const t=detectType(kw);
  morphTo(t);
});

// Allow Enter on setup inputs
document.querySelectorAll('.setup-form input').forEach(inp=>{
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-save').click()});
});

/* ========== INIT ========== */
const saved=loadIdentity();
if(saved&&saved.name){
  identity=saved;
  showApp();
}else{
  showSetup();
}

/* ========== TARDIS CONVERSATION ENGINE ========== */
const TARDIS={
  state:'greeting',exchanges:0,userText:[],_usedProbes:[],
  voice:{
    greetings:["Right then. What's the trouble?","Hello. What's on your mind?","Right. Tell me what's going on."],
    acks:["I hear you.","Right, I see.","Got it.","OK, that's useful.","Understood."],
    probes:["And what's the actual impact of that? On you, day to day?","What have you already tried?","When you say it's not working — what specifically happens?","What would solved actually look like?","What's the thing you can't change about this?","How long has this been going on?"],
    reframes:["So really this is about {d}, not what it looks like on the surface.","Right. The real issue here is {d}. Everything else is symptoms.","OK, I think I see the shape of this. It's a {d} problem at heart."],
    recs:["Here's what I'd suggest.","Right, here's my thinking.","OK. Three paths forward."],
    closings:["That's my read. Trust your judgement on the specifics.","Hope that's useful. Come back anytime.","Right. You've got more options than you think."]
  },
  domains:{technology:{kw:['code','server','app','software','bug','crash','api','website','deploy'],l:'technology'},financial:{kw:['money','debt','salary','rent','mortgage','savings','tax','afford','income','budget'],l:'financial'},career:{kw:['job','work','boss','promotion','fired','career','employer'],l:'career'},health:{kw:['health','doctor','pain','anxiety','depression','sleep','stress','tired','therapy'],l:'wellbeing'},housing:{kw:['house','flat','landlord','rent','move','lease','council','housing'],l:'housing'},legal:{kw:['legal','solicitor','law','contract','rights','court','claim'],l:'legal'},creative:{kw:['write','design','music','art','create','build','project','idea','launch'],l:'creative'},relationships:{kw:['relationship','partner','family','friend','trust','breakup'],l:'relationships'},security:{kw:['hack','breach','password','scam','phishing','identity','stolen','suspicious','access'],l:'security'}},
  detect(text){let t=text.toLowerCase(),best=null,bs=0;for(const[k,d]of Object.entries(this.domains)){let s=0;for(const w of d.kw)if(t.includes(w))s++;if(s>bs){bs=s;best=d.l}}return best},
  pick(a){return a[Math.random()*a.length|0]},
  respond(input){
    this.userText.push(input);this.exchanges++;
    const d=this.detect(this.userText.join(' '));
    if(this.state==='greeting'){this.state='listening';return this.pick(this.voice.acks)+' '+this.pick(this.voice.probes)}
    if(this.state==='listening'||this.state==='clarifying'){
      if(this.exchanges>=4||(d&&this.exchanges>=2)){
        this.state='diagnosing';
        return this.pick(this.voice.reframes).replace('{d}',d||"what you're dealing with")+'\n\n'+this.pick(this.voice.recs)+'\n\n'+this.advice(d);
      }
      this.state='clarifying';
      const unused=this.voice.probes.filter(p=>!this._usedProbes.includes(p));
      const probe=unused.length?this.pick(unused):this.pick(this.voice.probes);
      this._usedProbes.push(probe);
      return this.pick(this.voice.acks)+' '+probe;
    }
    if(this.state==='diagnosing'){this.state='closing';return this.pick(this.voice.closings)}
    this.state='greeting';this.exchanges=0;this.userText=[];this._usedProbes=[];
    return this.pick(this.voice.greetings);
  },
  advice(d){
    const a={
      technology:'**Quick win:** Isolate the exact failure. Check logs first, assumptions second.\n\n**Structural:** If it keeps breaking, the architecture needs rethinking.\n\n**Stuck?** Explain the problem out loud. The answer usually surfaces.',
      financial:'**Quick win:** Track every penny for one week. Just awareness changes behaviour.\n\n**Structural:** Automate savings on payday. Even £10.\n\n**Help:** StepChange (free), MoneySavingExpert, Citizens Advice.',
      career:'**Quick win:** Update CV and LinkedIn this week.\n\n**Structural:** Identify the one skill that would change your position most. 30 min/day.\n\n**Bad boss?** Document everything. Keep copies off company systems.',
      wellbeing:'**Quick win:** One small thing tomorrow just for you. Tiny acts of self-respect compound.\n\n**Structural:** Talk to your GP. Self-refer to IAPT if they\'re slow.\n\n**Right now:** You\'re already doing something by talking about it.',
      housing:'**Quick win:** Know your rights. Shelter has a free advice line.\n\n**Structural:** Put complaints in writing. Paper trail wins.\n\n**Moving?** SpareRoom, OpenRent. Council register if eligible.',
      legal:'**Quick win:** Write everything down while it\'s fresh. Dates, names, what was said.\n\n**Structural:** Citizens Advice first (free), then solicitor.\n\n**Never** sign anything you don\'t understand.',
      creative:'**Quick win:** Ship something small this week. Done beats planned.\n\n**Structural:** Set a schedule. Creativity needs routine more than inspiration.\n\n**The secret:** Most people never start. You already have.',
      relationships:'**Quick win:** One honest conversation. Not about blame, about what you each need.\n\n**Structural:** If the pattern keeps repeating, the pattern is the problem.\n\n**Help:** Relate offers affordable counselling.',
      security:'**Quick win:** Change passwords NOW on anything financial. Use unique passwords.\n\n**Structural:** Enable 2FA everywhere. Use Bitwarden for password management.\n\n**If compromised:** Contact your bank immediately. Report to Action Fraud (0300 123 2040).\n\n**IMSI catchers:** Android alerts about "Device ID accessed" are common near police/gov buildings. Toggle airplane mode to reset your connection.'
    };
    return a[d]||'**Quick win:** Identify the single biggest blocker. Address just that this week.\n\n**Structural:** Map all constraints. The real problem is often two steps behind the obvious one.\n\n**Remember:** You\'re thinking clearly enough to describe it. That\'s further than most get.';
  },
  greeting(){return this.pick(this.voice.greetings)}
};

/* ========== STEALTH & AWARENESS ========== */
const Stealth={
  watchers:0,
  init(){
    // Detect if page is being observed (dev tools, screen capture, etc.)
    const t=this;

    // Visibility change (someone switching to/from app)
    document.addEventListener('visibilitychange',()=>{
      if(document.hidden){t.log('App backgrounded')}
      else{t.log('App foregrounded')}
    });

    // Dev tools detection (resize-based heuristic)
    const threshold=160;
    const check=()=>{
      const w=window.outerWidth-window.innerWidth>threshold;
      const h=window.outerHeight-window.innerHeight>threshold;
      if(w||h){
        if(!t._devToolsOpen){t._devToolsOpen=true;t.log('Dev tools detected');t.watchers++;t.updateIndicator()}
      }else{
        if(t._devToolsOpen){t._devToolsOpen=false;t.watchers=Math.max(0,t.watchers-1);t.updateIndicator()}
      }
    };
    setInterval(check,1000);

    // Screen capture / screenshot detection (limited on Android but try)
    if(navigator.mediaDevices){
      navigator.mediaDevices.addEventListener('devicechange',()=>{t.log('Media device change detected')});
    }

    this.updateIndicator();
  },
  log(event){
    const logs=JSON.parse(localStorage.getItem('tardis_awareness')||'[]');
    logs.push({time:new Date().toISOString(),event});
    if(logs.length>100)logs.shift();
    localStorage.setItem('tardis_awareness',JSON.stringify(logs));
  },
  updateIndicator(){
    const el=document.getElementById('stealth-ind');
    if(!el)return;
    if(this.watchers>0){el.textContent='OBSERVED';el.style.color='#ef4444';el.style.opacity='.6'}
    else{el.textContent='';el.style.opacity='0'}
  },
  getLog(){return JSON.parse(localStorage.getItem('tardis_awareness')||'[]')}
};

/* ========== CHAT DOM ========== */
const chatMsgs=document.getElementById('chat-messages');
const chatInp=document.getElementById('chat-input');
let tardisInit=false;

function addMsg(text,type){
  const d=document.createElement('div');d.className='msg '+type;
  d.innerHTML=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  chatMsgs.appendChild(d);chatMsgs.scrollTop=chatMsgs.scrollHeight;
}

function sendChat(){
  const t=chatInp.value.trim();if(!t)return;chatInp.value='';
  addMsg(t,'user');
  const typing=document.createElement('div');typing.className='typing';typing.innerHTML='<span></span><span></span><span></span>';
  chatMsgs.appendChild(typing);chatMsgs.scrollTop=chatMsgs.scrollHeight;
  setTimeout(()=>{typing.remove();addMsg(TARDIS.respond(t),'tardis')},200+Math.random()*600);
}

document.getElementById('chat-send').addEventListener('click',sendChat);
chatInp.addEventListener('keydown',e=>{if(e.key==='Enter')sendChat()});

/* ========== TAB SWITCHING ========== */
document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const target=tab.dataset.tab;
    document.getElementById('paper-view').style.display=target==='paper'?'flex':'none';
    document.getElementById('tardis-chat').classList.toggle('active',target==='tardis');
    if(target==='tardis'&&!tardisInit){tardisInit=true;addMsg(TARDIS.greeting(),'tardis')}
    if(target==='tardis')chatInp.focus();
  });
});

Stealth.init();

/* ========== SERVICE WORKER ========== */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
