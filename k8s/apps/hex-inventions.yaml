# Hex Inventions — Daily IGOR Protocol teardowns
# The invention pipeline and content publishing engine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hex-inventions
  namespace: tardis-apps
  labels:
    app: hex-inventions
    part-of: tardis-sovereign
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hex-inventions
  template:
    metadata:
      labels:
        app: hex-inventions
    spec:
      containers:
        - name: hex-inventions
          image: ghcr.io/mrjkilcoyne-lgtm/hex-inventions:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "postgresql://tardis:$(POSTGRES_PASSWORD)@postgres.tardis-core:5432/tardis"
            - name: REDIS_URL
              value: "redis://redis.tardis-core:6379"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: hex-inventions
  namespace: tardis-apps
spec:
  selector:
    app: hex-inventions
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hex-inventions
  namespace: tardis-apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - hex.tardis-sovereign.com
      secretName: hex-inventions-tls
  rules:
    - host: hex.tardis-sovereign.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hex-inventions
                port:
                  number: 80
