# ClaimourLife — 1300+ spells for reclaiming your digital life
# Eleventy static site served via nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claimourlife
  namespace: tardis-apps
  labels:
    app: claimourlife
    part-of: tardis-sovereign
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claimourlife
  template:
    metadata:
      labels:
        app: claimourlife
    spec:
      containers:
        - name: claimourlife
          image: ghcr.io/mrjkilcoyne-lgtm/claimourlife:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: claimourlife
  namespace: tardis-apps
spec:
  selector:
    app: claimourlife
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claimourlife
  namespace: tardis-apps
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - claimourlife.com
      secretName: claimourlife-tls
  rules:
    - host: claimourlife.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claimourlife
                port:
                  number: 80
